    <h2><em>seven words</em></h2>
    
    <p>
    <em>seven words</em> is a seven-part jazz suite based on Jesus Christ’s seven last words from the cross. The suite takes each ‘word’ from Christ, meditates on it through jazz improvisation and puts it in conversation with other biblical texts.
